steps:
  # 1. Build the container image with secrets injected as build args
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker build \
          --build-arg VITE_GOOGLE_CIVIC_API_KEY=$$CIVIC_KEY \
          --build-arg VITE_GEMINI_API_KEY=$$GEMINI_KEY \
          -t us-central1-docker.pkg.dev/$PROJECT_ID/election-assistant/app:latest \
          .
    secretEnv: ['CIVIC_KEY', 'GEMINI_KEY']

  # 2. Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/election-assistant/app:latest']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'election-assistant'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/election-assistant/app:latest'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/VITE_GOOGLE_CIVIC_API_KEY/versions/latest
      env: 'CIVIC_KEY'
    - versionName: projects/$PROJECT_ID/secrets/VITE_GEMINI_API_KEY/versions/latest
      env: 'GEMINI_KEY'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/election-assistant/app:latest'
